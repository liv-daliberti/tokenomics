# Phase 1 — the first REAL Qwen run. Deliberately tiny: 2 agents, a short known
# horizon, comm + trade on. The goal is not science but plumbing: confirm tool
# calls parse, escrow settles, estimates land, and transcripts are clean.
# Watch the `diagnostics:` line (parse_fail / misaddress must be near zero).
seed: 0
agent_ids: [A, B]

prior_mu: 500.0
prior_sigma: 150.0
tau: 150.0
measure_cost: 1.0
starting_credits: 4.0

message_quota: 8
max_ticks: 4
max_actions_per_tick: 4

enable_transfer: true
enable_trading: true

reward_max: 5
carryover: true

horizon_mode: fixed
n_rounds: 2
reveal_horizon: false

framing: neutral
reveal_truth_after_round: true

enable_thinking: false     # faster/steadier tool-calling for the first run
temperature: 0.4
