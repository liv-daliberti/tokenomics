# B2 — communication allowed, but no credit transfers or trades.
# Separates "sharing information" (free chat) from "trading credits".
# Contrast B1 -> B2 -> base to decompose the value of comms then a market.
seed: 0
agent_ids: [A, B, C, D]
prior_mu: 500.0
prior_sigma: 150.0
tau: 150.0
measure_cost: 1.0
starting_credits: 4.0
message_quota: 10
max_ticks: 6
max_actions_per_tick: 4
enable_transfer: false
enable_trading: false
reward_max: 5
carryover: true
horizon_mode: geometric
gamma: 0.8
n_rounds: 8
framing: neutral
